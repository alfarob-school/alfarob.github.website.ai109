<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Pong</title>
  <style>
    :root {
      --pink: #ff4fa3;
      --purple: #7d3cff;
      --cream: #fff8fc;
      --ink: #2a1739;
      --card: rgba(255, 255, 255, 0.94);
      --line: rgba(125, 60, 255, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ff7fbe;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 12% 24%, rgba(255, 255, 255, 0.65) 0 1px, transparent 1.5px),
        radial-gradient(circle at 76% 14%, rgba(255, 255, 255, 0.6) 0 1px, transparent 1.6px),
        radial-gradient(circle at 32% 78%, rgba(255, 243, 252, 0.62) 0 1.2px, transparent 1.8px),
        radial-gradient(circle at 92% 82%, rgba(255, 255, 255, 0.55) 0 1px, transparent 1.7px);
      background-size: 160px 160px, 200px 200px, 180px 180px, 210px 210px;
      opacity: 0.62;
      animation: drift 16s linear infinite;
    }

    body::after {
      background:
        radial-gradient(circle at 18% 36%, rgba(255, 255, 255, 0.85) 0 1.2px, transparent 1.9px),
        radial-gradient(circle at 54% 62%, rgba(255, 236, 248, 0.8) 0 1.1px, transparent 1.8px),
        radial-gradient(circle at 84% 26%, rgba(255, 255, 255, 0.78) 0 1px, transparent 1.8px);
      background-size: 250px 250px, 300px 300px, 280px 280px;
      opacity: 0.34;
      animation: twinkle 4.5s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.22; }
      to { opacity: 0.5; }
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-18px); }
    }

    .game-wrap {
      width: min(900px, 100%);
      background: var(--card);
      border: 2px solid rgba(125, 60, 255, 0.12);
      border-radius: 22px;
      padding: 1.1rem;
      box-shadow: 0 18px 40px rgba(91, 33, 182, 0.15);
      position: relative;
      z-index: 1;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }

    .title {
      margin: 0 0 0.4rem;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      line-height: 1.05;
      color: var(--purple);
    }

    .subtitle {
      margin: 0 0 1rem;
      color: #6e458f;
      font-size: 1rem;
    }

    .score {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 0.06em;
      font-weight: 700;
      color: var(--purple);
    }

    .controls {
      font-size: 0.95rem;
      color: #5e3d7d;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    a {
      color: var(--pink);
      text-decoration: none;
      border-bottom: 1px dashed transparent;
      transition: border-color 150ms ease, color 150ms ease;
    }

    a:hover {
      border-color: var(--pink);
      color: #c92f7b;
    }

    button {
      font: inherit;
      color: var(--cream);
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: 0;
      border-radius: 999px;
      padding: 0.55rem 1rem;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(125, 60, 255, 0.22);
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(125, 60, 255, 0.28);
    }

    button:active {
      transform: translateY(0);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.12), transparent 34%),
        linear-gradient(180deg, #4d186c, #2a123f 55%, #1a0d29);
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.38);
      box-shadow: inset 0 0 0 1px var(--line), inset 0 -32px 48px rgba(0, 0, 0, 0.2);
    }

    .status {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      min-height: 1.25rem;
      color: #6e458f;
    }
  </style>
</head>
<body>
  <main class="game-wrap">
    <h1 class="title">Pink Galaxy Pong</h1>
    <p class="subtitle">Same game, now matching the homepage vibe.</p>
    <div class="hud">
      <div class="score">Player: <span id="playerScore">0</span> | AI: <span id="aiScore">0</span></div>
      <div class="controls">Move: W/S or Arrow Up/Down <button id="restartBtn" type="button">Restart</button> <a href="index.html">Back to Home</a></div>
    </div>

    <canvas id="pong" width="880" height="500" aria-label="Pong game area"></canvas>
    <p class="status" id="status">First to 7 points wins.</p>
  </main>

  <script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");

    const playerScoreEl = document.getElementById("playerScore");
    const aiScoreEl = document.getElementById("aiScore");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");

    const state = {
      width: canvas.width,
      height: canvas.height,
      winningScore: 7,
      running: true,
      keys: {
        up: false,
        down: false,
      },
      player: {
        x: 24,
        y: canvas.height / 2 - 55,
        w: 14,
        h: 110,
        speed: 8,
        score: 0,
      },
      ai: {
        x: canvas.width - 38,
        y: canvas.height / 2 - 55,
        w: 14,
        h: 110,
        speed: 6.3,
        score: 0,
        deadZone: 20,
      },
      ball: {
        x: canvas.width / 2,
        y: canvas.height / 2,
        r: 8,
        vx: 5,
        vy: 3,
        maxSpeed: 12,
      },
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function resetBall(direction = 1) {
      state.ball.x = state.width / 2;
      state.ball.y = state.height / 2;
      const speed = 5;
      state.ball.vx = speed * direction;
      state.ball.vy = (Math.random() * 4 - 2) || 1.5;
    }

    function resetGame() {
      state.player.score = 0;
      state.ai.score = 0;
      state.running = true;
      statusEl.textContent = "First to 7 points wins.";
      playerScoreEl.textContent = "0";
      aiScoreEl.textContent = "0";
      state.player.y = state.height / 2 - state.player.h / 2;
      state.ai.y = state.height / 2 - state.ai.h / 2;
      resetBall(Math.random() > 0.5 ? 1 : -1);
    }

    function drawCourt() {
      ctx.clearRect(0, 0, state.width, state.height);
      const courtGradient = ctx.createLinearGradient(0, 0, 0, state.height);
      courtGradient.addColorStop(0, "#5a1f7e");
      courtGradient.addColorStop(0.55, "#35134f");
      courtGradient.addColorStop(1, "#1b0d2b");
      ctx.fillStyle = courtGradient;
      ctx.fillRect(0, 0, state.width, state.height);

      ctx.fillStyle = "rgba(255, 255, 255, 0.16)";
      for (let i = 0; i < 28; i += 1) {
        const x = (i * 137) % state.width;
        const y = (i * 83) % state.height;
        ctx.beginPath();
        ctx.arc(x, y, i % 3 === 0 ? 1.8 : 1.1, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.strokeStyle = "rgba(255, 232, 247, 0.42)";
      ctx.lineWidth = 4;
      ctx.setLineDash([14, 16]);
      ctx.beginPath();
      ctx.moveTo(state.width / 2, 16);
      ctx.lineTo(state.width / 2, state.height - 16);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(state.width / 2, state.height / 2, 54, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawPaddle(paddle) {
      const paddleGradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y + paddle.h);
      paddleGradient.addColorStop(0, "#ffd4ee");
      paddleGradient.addColorStop(1, "#ff73bb");
      ctx.fillStyle = paddleGradient;
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
    }

    function drawBall() {
      ctx.beginPath();
      ctx.fillStyle = "#fff8fc";
      ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI * 2);
      ctx.shadowBlur = 18;
      ctx.shadowColor = "rgba(255, 79, 163, 0.6)";
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function updatePlayer() {
      if (state.keys.up) {
        state.player.y -= state.player.speed;
      }
      if (state.keys.down) {
        state.player.y += state.player.speed;
      }
      state.player.y = clamp(state.player.y, 0, state.height - state.player.h);
    }

    function updateAI() {
      const target = state.ball.y - state.ai.h / 2;
      const center = state.ai.y + state.ai.h / 2;
      if (center < state.ball.y - state.ai.deadZone) {
        state.ai.y += state.ai.speed;
      } else if (center > state.ball.y + state.ai.deadZone) {
        state.ai.y -= state.ai.speed;
      }
      state.ai.y = clamp(state.ai.y, 0, state.height - state.ai.h);

      // Add tiny imperfect behavior so AI is beatable.
      if (Math.abs(target - state.ai.y) < 2 && Math.random() < 0.015) {
        state.ai.y += (Math.random() - 0.5) * 18;
      }
    }

    function paddleCollision(paddle) {
      return (
        state.ball.x - state.ball.r < paddle.x + paddle.w &&
        state.ball.x + state.ball.r > paddle.x &&
        state.ball.y + state.ball.r > paddle.y &&
        state.ball.y - state.ball.r < paddle.y + paddle.h
      );
    }

    function updateBall() {
      state.ball.x += state.ball.vx;
      state.ball.y += state.ball.vy;

      if (state.ball.y - state.ball.r <= 0 || state.ball.y + state.ball.r >= state.height) {
        state.ball.vy *= -1;
      }

      if (paddleCollision(state.player) && state.ball.vx < 0) {
        const offset = (state.ball.y - (state.player.y + state.player.h / 2)) / (state.player.h / 2);
        state.ball.vx = Math.min(Math.abs(state.ball.vx) + 0.5, state.ball.maxSpeed);
        state.ball.vy += offset * 2.5;
      }

      if (paddleCollision(state.ai) && state.ball.vx > 0) {
        const offset = (state.ball.y - (state.ai.y + state.ai.h / 2)) / (state.ai.h / 2);
        state.ball.vx = -Math.min(Math.abs(state.ball.vx) + 0.45, state.ball.maxSpeed);
        state.ball.vy += offset * 2.2;
      }

      state.ball.vy = clamp(state.ball.vy, -8, 8);

      if (state.ball.x < -20) {
        state.ai.score += 1;
        aiScoreEl.textContent = String(state.ai.score);
        checkGameState();
        resetBall(1);
      }

      if (state.ball.x > state.width + 20) {
        state.player.score += 1;
        playerScoreEl.textContent = String(state.player.score);
        checkGameState();
        resetBall(-1);
      }
    }

    function checkGameState() {
      if (state.player.score >= state.winningScore) {
        state.running = false;
        statusEl.textContent = "You win! Press Restart to play again.";
      } else if (state.ai.score >= state.winningScore) {
        state.running = false;
        statusEl.textContent = "AI wins! Press Restart to try again.";
      }
    }

    function drawFrame() {
      drawCourt();
      drawPaddle(state.player);
      drawPaddle(state.ai);
      drawBall();
    }

    function tick() {
      if (state.running) {
        updatePlayer();
        updateAI();
        updateBall();
      }
      drawFrame();
      requestAnimationFrame(tick);
    }

    function handleKey(event, isDown) {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") {
        state.keys.up = isDown;
        event.preventDefault();
      }
      if (key === "arrowdown" || key === "s") {
        state.keys.down = isDown;
        event.preventDefault();
      }
    }

    window.addEventListener("keydown", (event) => handleKey(event, true));
    window.addEventListener("keyup", (event) => handleKey(event, false));
    restartBtn.addEventListener("click", resetGame);

    resetGame();
    tick();
  </script>
</body>
</html>
